# CD Pipeline - Deploys to Render on merge to master
# Run tests → trigger Render deploy hook → Render builds the Docker image from the repo

name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch: # Allow manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Run tests
        env:
          SPRING_PROFILES_ACTIVE: test
        run: mvn test

      - name: Trigger Render deploy
        run: curl -fsS -o /dev/null "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Deployment notification
        run: |
          echo "Render deploy triggered"
          echo "Render builds the Docker image and swaps it in once healthy"
          echo "Check https://cesarvillarreal.dev in a few minutes"

# Required GitHub Secrets:
# ────────────────────────
# RENDER_DEPLOY_HOOK_URL - Deploy hook URL from Render dashboard
#                          (Service → Settings → Deploy Hook)
#
# Render auto-deploy is OFF — deploys only happen through this workflow,
# so nothing reaches production without tests passing first
