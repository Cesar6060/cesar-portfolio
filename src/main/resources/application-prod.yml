spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    baseline-on-migrate: true
    clean-disabled: true
  # Gmail SMTP for contact-form notifications. Empty-string defaults let the
  # app boot when MAIL_* vars are unset — send failures are caught at send time.
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# Email notifications via Gmail SMTP
app:
  email:
    enabled: true
    notification-recipient: ${NOTIFICATION_EMAIL:cesarvillarreal11@gmail.com}

logging:
  level:
    com.cesarvillarreal.portfolio: INFO
