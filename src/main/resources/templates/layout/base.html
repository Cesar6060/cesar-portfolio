<!doctype html>
<html
  lang="en"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title layout:title-pattern="$CONTENT_TITLE - Cesar Villarreal">
      Cesar Villarreal - Portfolio
    </title>
    <div th:replace="~{fragments/favicon :: favicon}"></div>

    <!-- SEO Meta Tags -->
    <th:block
      th:replace="~{fragments/seo :: meta(
        ${pageTitle} ?: 'Cesar Villarreal - Cloud Engineer & Software Developer',
        ${pageDescription} ?: 'Portfolio of Cesar Villarreal - Cloud Engineer, Technical Consultant, and Software Engineer. Building enterprise-grade applications with Spring Boot, AWS, and modern technologies.',
        ${pageUrl} ?: 'https://cesarvillarreal.dev',
        ${pageImage} ?: 'https://cesarvillarreal.dev/images/og-default.png',
        ${pageType} ?: 'website'
    )}"
    ></th:block>

    <!-- Theme initialization (before Tailwind to prevent flash) -->
    <script>
      (function () {
        const theme = localStorage.getItem("theme");
        if (
          theme === "dark" ||
          (!theme && window.matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tailwind Configuration -->
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: {
                50: "#eff6ff",
                100: "#dbeafe",
                200: "#bfdbfe",
                300: "#93c5fd",
                400: "#60a5fa",
                500: "#3b82f6",
                600: "#2563eb",
                700: "#1d4ed8",
                800: "#1e40af",
                900: "#1e3a8a",
              },
            },
          },
        },
      };
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
      }
      .font-display {
        font-family: "Playfair Display", Georgia, serif;
      }
      /* Animations */
      .animate-fade-in {
        animation: fadeIn 0.8s ease-out forwards;
      }
      .animate-fade-in-up {
        animation: fadeInUp 0.8s ease-out forwards;
        opacity: 0;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .delay-100 {
        animation-delay: 0.1s;
      }
      .delay-200 {
        animation-delay: 0.2s;
      }
      .delay-300 {
        animation-delay: 0.3s;
      }
    </style>
  </head>
  <body
    class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 antialiased transition-colors duration-200"
  >
    <!-- Navbar -->
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <!-- Main Content -->
    <main layout:fragment="content">
      <!-- Page content goes here -->
    </main>

    <!-- Footer -->
    <div th:replace="~{fragments/footer :: footer}"></div>

    <!-- Mobile Menu & Dark Mode JavaScript -->
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        // Mobile menu toggle
        const menuButton = document.querySelector(".mobile-menu-button");
        const mobileMenu = document.querySelector(".mobile-menu");
        if (menuButton && mobileMenu) {
          menuButton.addEventListener("click", function () {
            mobileMenu.classList.toggle("hidden");
          });
        }

        // Dark mode toggle
        const themeToggle = document.getElementById("theme-toggle");
        const sunIcon = document.getElementById("sun-icon");
        const moonIcon = document.getElementById("moon-icon");

        function updateThemeIcons() {
          const isDark = document.documentElement.classList.contains("dark");
          if (sunIcon && moonIcon) {
            sunIcon.classList.toggle("hidden", !isDark);
            moonIcon.classList.toggle("hidden", isDark);
          }
        }

        if (themeToggle) {
          updateThemeIcons();
          themeToggle.addEventListener("click", function () {
            document.documentElement.classList.toggle("dark");
            const isDark = document.documentElement.classList.contains("dark");
            localStorage.setItem("theme", isDark ? "dark" : "light");
            updateThemeIcons();
          });
        }
      });
    </script>

    <!-- JSON-LD Structured Data -->
    <th:block th:replace="~{fragments/json-ld :: structured-data}"></th:block>
  </body>
</html>
